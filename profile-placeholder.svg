<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">Profile placeholder</title>
  <desc id="desc">A colorful placeholder for a student profile photo.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8be9fd"/>
      <stop offset="0.5" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#f9a8d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#050816" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="800" height="800" rx="92" fill="#101a33"/>
  <circle cx="180" cy="155" r="130" fill="#8be9fd" opacity="0.18"/>
  <circle cx="650" cy="220" r="170" fill="#f9a8d4" opacity="0.18"/>
  <circle cx="540" cy="660" r="220" fill="#c084fc" opacity="0.16"/>
  <g filter="url(#shadow)">
    <circle cx="400" cy="310" r="120" fill="url(#g)"/>
    <path d="M190 680c28-135 124-218 210-218s182 83 210 218" fill="url(#g)"/>
  </g>
  <text x="400" y="735" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#f7f7fb">Upload Photo</text>
</svg>
